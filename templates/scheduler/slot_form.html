{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="form-layout">
    <form class="form-panel animated-border" method="post" novalidate>
        {% csrf_token %}
        <div class="section-kicker">Time range</div>
        <h1>{{ title }}</h1>

        {% if form.non_field_errors %}
            <div class="form-alert">{{ form.non_field_errors }}</div>
        {% endif %}

        <label>
            {{ form.slot_type.label }}
            {{ form.slot_type }}
            {{ form.slot_type.errors }}
        </label>

        <div class="field-grid">
            <label>
                {{ form.day_of_week.label }}
                {{ form.day_of_week }}
                {{ form.day_of_week.errors }}
            </label>
            <label data-time-field>
                {{ form.start_time_minutes.label }}
                {{ form.start_time_minutes }}
                {{ form.start_time_minutes.errors }}
            </label>
            <label data-time-field>
                {{ form.end_time_minutes.label }}
                {{ form.end_time_minutes }}
                {{ form.end_time_minutes.errors }}
            </label>
        </div>

        <label>
            {{ form.note.label }}
            {{ form.note }}
            {{ form.note.errors }}
        </label>

        <div class="form-actions">
            <button class="button button-primary" type="submit">{{ submit_label }}</button>
            <a class="button button-ghost" href="{% url 'schedule' %}">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/slot_form.js' %}"></script>
{% endblock %}
