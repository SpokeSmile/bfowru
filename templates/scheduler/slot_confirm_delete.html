{% extends 'base.html' %}

{% block title %}Удалить время{% endblock %}

{% block content %}
<section class="form-layout">
    <form class="form-panel animated-border" method="post">
        {% csrf_token %}
        <div class="section-kicker">Remove slot</div>
        <h1>Удалить время?</h1>
        <p class="confirm-text">{{ slot.get_day_of_week_display }}, {{ slot.label }}</p>

        <div class="form-actions">
            <button class="button button-danger" type="submit">Удалить</button>
            <a class="button button-ghost" href="{% url 'schedule' %}">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}
